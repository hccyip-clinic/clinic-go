{{define "content"}}
<div class="max-w-4xl">
    <div class="mb-6"><p class="eyebrow">Administration</p><p class="mt-1 text-sm text-[#657774]">Manage the clinic identity and local access settings.</p></div>
    <form id="settings-form" method="post" action="/settings" class="surface-panel p-6 sm:p-8">
        <input id="settings-csrf-token" type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <div class="grid gap-6 sm:grid-cols-2">
            <div class="sm:col-span-2"><h2 class="text-lg font-semibold">Clinic details</h2><p class="mt-1 text-sm text-[#657774]">These details appear throughout the workspace and on printed documents.</p></div>
            <div class="sm:col-span-2"><label for="settings-clinic-name" class="field-label">Clinic name</label><input id="settings-clinic-name" name="clinic_name" value="{{.Settings.ClinicName}}" required class="field-input"></div>
            <div class="sm:col-span-2"><label for="settings-address" class="field-label">Address</label><input id="settings-address" name="address" value="{{.Settings.Address}}" class="field-input"></div>
            <div><label for="settings-phone" class="field-label">Phone</label><input id="settings-phone" name="phone" value="{{.Settings.Phone}}" class="field-input"></div>
            <div><label for="settings-practitioner" class="field-label">Practitioner</label><input id="settings-practitioner" name="practitioner" value="{{.Settings.Practitioner}}" required class="field-input"></div>
            <div class="sm:col-span-2 border-t border-[#d8e3e0] pt-6"><h2 class="text-lg font-semibold">Access</h2><p class="mt-1 text-sm text-[#657774]">Leave these fields blank to keep the current password.</p></div>
            <div><label for="settings-new-password" class="field-label">New password <span class="font-normal text-[#657774]">(optional)</span></label><input id="settings-new-password" name="new_password" type="password" minlength="12" class="field-input"></div>
            <div><label for="settings-confirm-password" class="field-label">Confirm new password</label><input id="settings-confirm-password" name="confirm_password" type="password" minlength="12" class="field-input"></div>
        </div>
        <div class="mt-8 flex justify-end border-t border-[#d8e3e0] pt-6"><button id="settings-save-button" type="submit" class="button-primary">Save settings</button></div>
    </form>
</div>
{{end}}
